<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Category Quiz App</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }

body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(135deg,#667eea,#764ba2);
}

.container {
  width: 400px;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  text-align: center;
}

h2 { margin-bottom: 15px; }

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin: 5px 0;
}

.category-btn {
  width: 100%;
  background: #667eea;
  color: white;
}

.option-btn {
  width: 100%;
  background: #f0f0f0;
}

.option-btn:hover { background: #ddd; }

.correct { background: #4caf50 !important; color: white; }
.wrong { background: #f44336 !important; color: white; }

#nextBtn {
  background: #667eea;
  color: white;
  margin-top: 10px;
  display: none;
}

.progress {
  height: 8px;
  background: #eee;
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #667eea;
}

.timer { margin-bottom: 10px; font-size: 14px; }

.hidden { display: none; }
</style>
</head>

<body>

<div class="container">

  <!-- Category Selection -->
  <div id="categoryScreen">
    <h2>Select Quiz Category</h2>
    <button class="category-btn" onclick="startQuiz('tech')">💻 Tech Quiz</button>
    <button class="category-btn" onclick="startQuiz('general')">🌍 General Knowledge</button>
    <button class="category-btn" onclick="startQuiz('fun')">🎬 Fun Quiz</button>
    <button class="category-btn" onclick="startQuiz('creative')">❤️ Creative Mode</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quizScreen" class="hidden">
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="timer">Time Left: <span id="time">10</span>s</div>
    <h2 id="question"></h2>
    <div id="options"></div>
    <button id="nextBtn">Next</button>
  </div>

  <!-- Result Screen -->
  <div id="resultScreen" class="hidden">
    <h2>Your Score: <span id="finalScore"></span></h2>
    <p id="percentage"></p>
    <p id="message"></p>
    <button onclick="restartQuiz()">Restart</button>
  </div>

</div>

<script>
const quizData = {
  tech: [
    { q: "Which language styles web pages?", o: ["HTML","CSS","Python","C++"], a: "CSS" },
    { q: "Which is a JS framework?", o: ["React","Django","Flask","Laravel"], a: "React" },
    { q: "Which symbol comments JS?", o: ["//","#","<!-- -->","**"], a: "//" }
  ],
  general: [
    { q: "Capital of India?", o: ["Mumbai","Delhi","Chennai","Kolkata"], a: "Delhi" },
    { q: "Largest planet?", o: ["Earth","Mars","Jupiter","Saturn"], a: "Jupiter" },
    { q: "National animal of India?", o: ["Lion","Tiger","Elephant","Peacock"], a: "Tiger" }
  ],
  fun: [
    { q: "Which superhero is from Wakanda?", o: ["Iron Man","Thor","Black Panther","Hulk"], a: "Black Panther" },
    { q: "Which movie has Hogwarts?", o: ["Avengers","Harry Potter","Frozen","Titanic"], a: "Harry Potter" },
    { q: "Which cartoon character loves spinach?", o: ["Tom","Jerry","Popeye","Shinchan"], a: "Popeye" }
  ],
  creative: [
    { q: "Which color symbolizes peace?", o: ["Red","Blue","White","Black"], a: "White" },
    { q: "Which shape has 3 sides?", o: ["Square","Triangle","Circle","Rectangle"], a: "Triangle" },
    { q: "Which sense helps you see?", o: ["Touch","Sight","Taste","Hearing"], a: "Sight" }
  ]
};

let currentCategory, currentQuestion = 0, score = 0, timer, timeLeft = 10;

function startQuiz(category) {
  currentCategory = category;
  document.getElementById("categoryScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  loadQuestion();
}

function loadQuestion() {
  resetState();
  const data = quizData[currentCategory][currentQuestion];
  document.getElementById("question").textContent = data.q;

  data.o.forEach(option => {
    const btn = document.createElement("button");
    btn.textContent = option;
    btn.classList.add("option-btn");
    btn.onclick = () => selectAnswer(btn, data.a);
    document.getElementById("options").appendChild(btn);
  });

  updateProgress();
  startTimer();
}

function resetState() {
  document.getElementById("options").innerHTML = "";
  document.getElementById("nextBtn").style.display = "none";
  clearInterval(timer);
  timeLeft = 10;
  document.getElementById("time").textContent = timeLeft;
}

function startTimer() {
  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("time").textContent = timeLeft;
    if (timeLeft === 0) {
      clearInterval(timer);
      document.getElementById("nextBtn").style.display = "block";
    }
  }, 1000);
}

function selectAnswer(button, correct) {
  clearInterval(timer);
  const buttons = document.querySelectorAll(".option-btn");

  buttons.forEach(btn => {
    if (btn.textContent === correct) btn.classList.add("correct");
    else btn.classList.add("wrong");
    btn.disabled = true;
  });

  if (button.textContent === correct) score++;

  document.getElementById("nextBtn").style.display = "block";
}

document.getElementById("nextBtn").onclick = () => {
  currentQuestion++;
  if (currentQuestion < quizData[currentCategory].length) {
    loadQuestion();
  } else {
    showResult();
  }
};

function updateProgress() {
  const percent = ((currentQuestion + 1) / 3) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

function showResult() {
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");

  const total = quizData[currentCategory].length;
  const percent = Math.round((score / total) * 100);

  document.getElementById("finalScore").textContent = score + "/" + total;
  document.getElementById("percentage").textContent = "Percentage: " + percent + "%";

  let msg = "";
  if (percent === 100) msg = "Outstanding Performance! 🎉";
  else if (percent >= 70) msg = "Great Job! 👏";
  else if (percent >= 40) msg = "Good Effort 👍";
  else msg = "Keep Practicing 💪";

  document.getElementById("message").textContent = msg;
}

function restartQuiz() {
  currentQuestion = 0;
  score = 0;
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("categoryScreen").classList.remove("hidden");
}
</script>

</body>
</html>
